<html lang="pt-br">
    <head>
        <!--Serve par setar o UNICODE do site para o usado em PT-BR-->
        <meta charset="UTF-8"/> 
        <title>Tela de Login</title>
        <title>Seja bem-vindo</title>
        
        <!--vinculando a tela, com o CSS para estilizar a página-->
        <link rel="stylesheet" type="text/css" href="../css/index.css">

      
    </head>
    <body>
        <!--Essa div, representa onde todo o conteúdo do site vai ficar-->
        <div class="container-principal">
            <!-- aqui é o espaço onde vamos criar o formulário-->
            <div class="formulario">
                <form action="../php/login.php" method="post">
                    <!-- adicionando campos do formulário-->
                    <input type="text" placeholder="Email:" name="email" required="true" minlength="3" maxlength="150">

                    <input type="password" placeholder="Senha:" name="senha" required="true" minlength="3" maxlength="250">

                    <!--adicionando botão que irá enviar as informações do site -->
                    <input type="submit" value="Entrar">
                </form>
                <a href="../html/cadastroUsuario.html">Não tem Cadastro? Clique aqui</a>
            </div>
        </div>
    </body>
</html>
